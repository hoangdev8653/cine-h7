version: "3.8"

services:
  app:
    build: .
    container_name: node_backend_app
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres_db
      - REDIS_HOST=redis-db
      - REDIS_PORT=6379
      - PORT=3007
    ports:
      - "3008:3007"
    depends_on:
      - postgres_db
      - redis-db
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network

  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  redis-db:
    image: redis:7-alpine
    container_name: redis_container
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - app-network

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge
